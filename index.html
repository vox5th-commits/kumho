<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>손태국 금호읍장님 퇴임식에 초대합니다 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', system-ui, sans-serif; }
        .photo { width: 100%; display: block; box-shadow: 0 10px 15px -3px rgb(165 243 252); }
        
        .title-area {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            padding: 40px 24px 30px;
        }
    </style>
</head>
<body class="bg-sky-50">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl overflow-hidden">

        <!-- 메인 사진 -->
        <img src="main-photo.jpg" alt="손태국 금호읍장님" class="photo">

        <!-- 예쁘게 디자인한 제목 영역 -->
        <div class="title-area text-center">
            <div class="flex justify-center gap-3 mb-4">
                <span class="text-4xl">🌸</span>
                <span class="text-4xl">🌼</span>
                <span class="text-4xl">🌺</span>
            </div>
            <h1 class="text-4xl font-bold tracking-tighter leading-tight text-slate-800">
                손태국 금호읍장님<br>
                퇴임식에 초대합니다
            </h1>
            <p class="mt-6 text-sky-600 text-lg font-medium">따뜻한 마음으로 함께해 주세요 💕</p>
        </div>

        <!-- 날짜 카드 (더 예쁘게) -->
        <div class="px-6 -mt-6 relative z-10">
            <div class="bg-white rounded-3xl shadow-xl p-8 text-center">
                <span class="px-6 py-2 bg-gradient-to-r from-sky-400 to-pink-400 text-white text-sm font-medium rounded-3xl">2026년 6월 18일 (목요일)</span>
                <p class="text-6xl font-bold text-sky-600 mt-5">10:00</p>
                <p class="text-slate-500 mt-1">오전 • 금호읍 행정복지센터 대강당</p>
            </div>
        </div>

        <!-- 나머지 내용 -->
        <div class="px-6 pt-8 pb-12 space-y-8">

            <!-- 장소 -->
            <div class="bg-white rounded-3xl p-7 shadow">
                <div class="flex items-center gap-4 mb-5">
                    <span class="text-3xl">📍</span>
                    <div class="flex-1">
                        <p class="font-semibold">금호읍 행정복지센터 대강당</p>
                        <p class="text-slate-600">경상북도 영천시 금호읍 금호로 153</p>
                    </div>
                </div>
                <div class="rounded-2xl overflow-hidden border border-slate-100">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3231.2!2d128.8985!3d36.0123!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3565f0b0b0b0b0b0%3A0x1234567890abcdef!2z6rSR7KSA7Yq47YOg7Iuc6rSR7JyV7ISx7Iuc!5e0!3m2!1sko!2skr!4v1713000000000" 
                            width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>

            <!-- 메시지 -->
            <div class="bg-gradient-to-br from-sky-50 to-pink-50 rounded-3xl p-8 text-center">
                <p class="text-lg leading-relaxed italic text-slate-700">
                    금호의 따뜻한 봄바람처럼,<br>
                    당신의 헌신을 늘 기억하겠습니다.<br>
                    새로운 시작을 축하합니다.
                </p>
                <div class="mt-6 text-sky-600 text-sm font-medium">— 금호읍 주민 및 직원 일동 —</div>
            </div>

            <!-- 갤러리 -->
            <div>
                <p class="text-center text-slate-500 text-sm mb-4">📸 함께한 소중한 순간들</p>
                <div class="gallery-grid grid grid-cols-4 gap-3" id="gallery"></div>
            </div>

            <!-- 공유 버튼 -->
            <button onclick="alert('카카오톡으로 공유하세요 💕')" 
                    class="w-full py-5 bg-gradient-to-r from-sky-500 to-pink-500 text-white rounded-3xl font-semibold text-lg flex items-center justify-center gap-3 shadow-lg">
                <i class="fas fa-share-alt"></i>
                초대장 링크 공유하기
            </button>
        </div>
    </div>

    <!-- 갤러리 모달 (이전과 동일) -->
    <div id="modal" class="modal hidden fixed inset-0 bg-black/90 z-[9999] items-center justify-center" onclick="if(event.target===this)closeModal()">
        <span onclick="closeModal()" class="absolute top-6 right-6 text-white text-5xl cursor-pointer">×</span>
        <img id="modal-image" class="max-w-[90%] max-h-[90%] rounded-3xl" alt="">
    </div>

    <footer class="text-center text-xs text-slate-400 py-8">
        © 2026 손태국 금호읍장님 퇴임식 모바일 초대장
    </footer>

    <script>
        tailwind.config = { content: [] };

        const photos = ["gallery-1.jpg", "gallery-2.jpg", "gallery-3.jpg", "gallery-4.jpg"];

        function createGallery() {
            const container = document.getElementById('gallery');
            photos.forEach((filename, i) => {
                const img = document.createElement('img');
                img.src = filename;
                img.className = "w-full aspect-square object-cover rounded-2xl cursor-pointer hover:scale-105 transition-transform";
                img.onclick = () => {
                    document.getElementById('modal-image').src = filename;
                    document.getElementById('modal').classList.remove('hidden');
                    document.getElementById('modal').classList.add('flex');
                };
                container.appendChild(img);
            });
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        window.onload = createGallery;
    </script>
</body>
</html>
