<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>손태국 금호읍장님 퇴임식에 초대합니다 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', system-ui, sans-serif; }
        .photo { width: 100%; display: block; box-shadow: 0 10px 15px -3px rgb(165 243 252); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 12px; }
        .gallery-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 16px; cursor: pointer; transition: all 0.3s; }
        .gallery-img:hover { transform: scale(1.05); box-shadow: 0 10px 15px -3px rgb(165 243 252); }
        
        /* 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { max-width: 90%; max-height: 90%; border-radius: 20px; }
        .modal-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body class="bg-sky-50">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl overflow-hidden">

        <!-- 큰 메인 사진 -->
        <img src="main-photo.jpg" alt="손태국 금호읍장님" class="photo">

        <!-- 내용 -->
        <div class="px-6 pt-8 pb-12 space-y-8">

            <!-- 제목 -->
            <div class="text-center">
                <div class="inline-flex items-center gap-2 text-sky-600 text-sm font-medium mb-3">
                    <span>🌸</span> 초대합니다 <span>🌸</span>
                </div>
                <h1 class="text-4xl font-bold tracking-tighter leading-none">
                    손태국 금호읍장님<br>
                    퇴임식에 초대합니다
                </h1>
            </div>

            <!-- 날짜 -->
            <div class="bg-white rounded-3xl shadow p-7 text-center">
                <span class="px-5 py-1 bg-sky-100 text-sky-600 text-sm font-medium rounded-3xl">2026년 6월 18일 (목요일)</span>
                <p class="text-5xl font-bold text-sky-600 mt-4">오전 10:00</p>
                <p class="text-slate-600 mt-2">금호읍 행정복지센터 대강당</p>
            </div>

            <!-- 장소 -->
            <div class="bg-white rounded-3xl p-7 shadow">
                <div class="flex items-center gap-4 mb-5">
                    <span class="text-3xl">📍</span>
                    <div class="flex-1">
                        <p class="font-semibold">금호읍 행정복지센터 대강당</p>
                        <p class="text-slate-600">경상북도 영천시 금호읍 금호로 153</p>
                    </div>
                </div>
                <div class="rounded-2xl overflow-hidden border border-slate-100">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3231.2!2d128.8985!3d36.0123!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3565f0b0b0b0b0b0%3A0x1234567890abcdef!2z6rSR7KSA7Yq47YOg7Iuc6rSR7JyV7ISx7Iuc!5e0!3m2!1sko!2skr!4v1713000000000" 
                            width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>

            <!-- 메시지 -->
            <div class="bg-gradient-to-br from-sky-50 to-pink-50 rounded-3xl p-8 text-center">
                <p class="text-lg leading-relaxed italic text-slate-700">
                    금호의 따뜻한 봄바람처럼,<br>
                    당신의 헌신을 늘 기억하겠습니다.<br>
                    새로운 시작을 축하합니다.
                </p>
                <div class="mt-6 text-sky-600 text-sm font-medium">— 금호읍 주민 및 직원 일동 —</div>
            </div>

            <!-- ★★★ 갤러리 ★★★ -->
            <div>
                <p class="text-center text-slate-500 text-sm mb-4">📸 함께한 소중한 순간들</p>
                <div class="gallery-grid" id="gallery">
                    <!-- JS로 자동 생성됨 -->
                </div>
            </div>

            <!-- 공유 버튼 -->
            <button onclick="alert('카카오톡으로 공유하세요 💕')" 
                    class="w-full py-5 bg-gradient-to-r from-sky-500 to-pink-500 text-white rounded-3xl font-semibold text-lg flex items-center justify-center gap-3 shadow-lg">
                <i class="fas fa-share-alt"></i>
                초대장 링크 공유하기
            </button>
        </div>
    </div>

    <!-- 확대 모달 -->
    <div id="modal" class="modal" onclick="if(event.target===this) closeModal()">
        <span class="modal-close" onclick="closeModal()">×</span>
        <img id="modal-image" class="modal-content" src="" alt="">
    </div>

    <footer class="text-center text-xs text-slate-400 py-8">
        © 2026 손태국 금호읍장님 퇴임식 모바일 초대장
    </footer>

    <script>
        tailwind.config = { content: [] };

        // 갤러리 사진 목록 (파일명만 추가/수정하세요)
        const photos = [
            "gallery-1.jpg",
            "gallery-2.jpg",
            "gallery-3.jpg",
            "gallery-4.jpg"
        ];

        // 갤러리 생성
        function createGallery() {
            const container = document.getElementById('gallery');
            photos.forEach((filename, index) => {
                const img = document.createElement('img');
                img.src = filename;
                img.alt = `추억 사진 ${index+1}`;
                img.className = 'gallery-img';
                img.onclick = () => openModal(filename);
                container.appendChild(img);
            });
        }

        // 모달 열기
        function openModal(src) {
            document.getElementById('modal-image').src = src;
            document.getElementById('modal').style.display = 'flex';
        }

        // 모달 닫기
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // 페이지 로드 시 갤러리 생성
        window.onload = createGallery;
    </script>
</body>
</html>
